<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
url('fondo.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
font-family:system-ui;
}

/* TARJETAS */
.card{
background:rgba(20,20,20,0.75);
backdrop-filter:blur(6px);
border-radius:18px;
padding:15px;
margin-bottom:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

/* TARJETA DESTACADA */
.bank{
background:linear-gradient(145deg,#d4af37,#f5d97b);
color:black;
font-weight:bold;
}

/* BOTONES */
.btn{
padding:6px;
border-radius:10px;
font-size:12px;
transition:0.2s;
}
.btn:hover{transform:scale(1.05);}

.gold{background:#d4af37;color:black;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
.blue{background:#2563eb;color:white;}

/* TEXTOS */
.title{font-size:13px;opacity:0.7;}
.big{font-size:20px;font-weight:bold;}

.tab{padding:8px;border-radius:10px;background:#111;}
.active{background:#d4af37;color:black;}
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="login" class="flex flex-col items-center justify-center h-screen">
<img src="logo.png" style="width:100px;">
<input id="pin" type="password" class="p-2 bg-black border text-center mt-2">
<button onclick="entrar()" class="btn gold mt-2">Entrar</button>
</div>

<div id="panel" style="display:none;">

<div class="flex gap-2 mb-3">
<button onclick="tab('c')" class="tab active">Cobranza</button>
<button onclick="tab('f')" class="tab">Finanzas</button>
</div>

<!-- COBRANZA -->
<div id="cobranza">
<div class="card">
<input type="month" id="mes" class="w-full p-2 bg-black text-white">
</div>
<div id="sillas"></div>
</div>

<!-- FINANZAS -->
<div id="finanzas" style="display:none;">

<div class="grid grid-cols-2 gap-3">

<div class="card bank">
<div class="title">Ingresos</div>
<div class="big" id="ingresos">$0</div>
</div>

<div class="card">
  <div class="title">Gastos</div>
  <div class="big text-red-400" id="gastos">$0</div>

  <!-- FORMULARIO GASTOS -->
  <input id="gastoConcepto" class="w-full p-2 mt-2 bg-black border" placeholder="Concepto del gasto">

  <input id="gastoFecha" type="date" class="w-full p-2 mt-2 bg-black border">

  <input id="gastoMonto" type="number" class="w-full p-2 mt-2 bg-black border" placeholder="Monto">

  <button onclick="agregarGasto()" class="btn red w-full mt-2">
    Agregar Gasto
  </button>
</div>

<div class="card">
<div class="title">USDT</div>
<div class="big text-green-400" id="wallet">0</div>
<button onclick="comprarUSDT()" class="btn gold w-full mt-2">Comprar</button>
</div>

<div class="card">
<div class="title">Efectivo</div>
<div class="big text-yellow-400" id="efectivo">$0</div>
</div>

<div class="card col-span-2">
<div class="title">Ganancia Real</div>
<div class="big text-green-400" id="ganancia">$0</div>
</div>

</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📊 Reporte del Mes</h3>
<div id="reporteMes"></div>
<button onclick="exportarReporte()" class="btn gold w-full mt-2">Exportar</button>
</div>

</div>

</div>

<script>

/* ELEMENTOS */
const login = document.getElementById("login");
const panel = document.getElementById("panel");
const pin = document.getElementById("pin");
const mes = document.getElementById("mes");

const sillas = document.getElementById("sillas");
const ingresos = document.getElementById("ingresos");
const gastos = document.getElementById("gastos");
const wallet = document.getElementById("wallet");
const efectivo = document.getElementById("efectivo");
const ganancia = document.getElementById("ganancia");
const reporteMes = document.getElementById("reporteMes");

const graficoEl = document.getElementById("grafico");
const gastoConcepto = document.getElementById("gastoConcepto");
const gastoFecha = document.getElementById("gastoFecha");
gastoFecha.value = new Date().toISOString().slice(0,10);
const gastoMonto = document.getElementById("gastoMonto");

/* LOGIN */
function entrar(){
  if(pin.value == "2210"){
    login.style.display = "none";
    panel.style.display = "block";
  }
}

/* MES */
mes.value = new Date().toISOString().slice(0,7);

/* TABS */
function tab(x){
  document.getElementById("cobranza").style.display = x=="c"?"block":"none";
  document.getElementById("finanzas").style.display = x=="f"?"block":"none";
}

/* FIREBASE */
firebase.initializeApp({
  apiKey:"AIzaSyA7g2TA_6P4Wwzw1AfbsfNtwZijA",
  projectId:"westeros-barbershop"
});
const db = firebase.firestore();


/* DATA */
let nombres=["Stark","Targaryen","Lannister","Baratheon","Guardia"];
let logos=["stark.png","targaryen.png","lannister.png","baratheon.png","night.png"];

/* LISTENER GLOBAL (IMPORTANTE) */
function refrescarTodo(){
  render();
  actualizar();
  cargarGrafico();
}

db.collection("pagos").onSnapshot(refrescarTodo);
db.collection("gastos").onSnapshot(refrescarTodo);
db.collection("usdt").onSnapshot(refrescarTodo);

/* COBRANZA */
function render(){
  sillas.innerHTML = "";
  let mesSel = mes.value;

  db.collection("pagos").get().then(snap => {

    nombres.forEach((n,i)=>{

      let semanas=[0,0,0,0];
      let historial="";

      snap.forEach(doc=>{
        let d = doc.data();
        if(d.barbero==n && d.mes==mesSel){
          semanas[d.semana-1] += d.monto;

          let f = new Date(d.fecha);
          historial += `
          <div style="display:flex;justify-content:space-between;font-size:12px;">
            <span>${f.toLocaleDateString()} - $${d.monto}</span>
            <button onclick="eliminar('${doc.id}')" style="color:red;">❌</button>
          </div>`;
        }
      });

      let total = semanas.reduce((a,b)=>a+b,0);
      let restante = 160-total;

      let semanasHTML="";
      for(let s=0;s<4;s++){
        let pagado = semanas[s]>=40;

        semanasHTML += `
        <div style="border-bottom:1px solid #333;padding:5px;">
          <div style="display:flex;justify-content:space-between;">
            <span>Semana ${s+1}</span>
            <span>
              ${pagado
                ? "<span style='color:#22c55e'>✔ $40</span>"
                : "<span style='color:#ef4444'>❌ $"+semanas[s]+"</span>"
              }
            </span>
          </div>

          <div style="display:flex;gap:5px;">
            <button onclick="abonar('${n}',${s+1})" class="btn green">Abonar</button>
            <button onclick="liquidar('${n}',${s+1})" class="btn gold">Liquidar</button>
          </div>
        </div>`;
      }

      sillas.innerHTML += `
      <div class="card text-center">

        <img src="${logos[i]}" style="width:50px;margin:auto;">
        <div class="big">
  ${n}
  <button onclick="editarBarbero('${n}')" class="btn blue">✏️</button>
</div>

        ${semanasHTML}

        <hr>

        Total: $${total}<br>
        Debe: $${restante}

        <button onclick="recibo('${n}',${total},${restante})" class="btn blue w-full mt-1">Recibo</button>

        <div class="mt-2 text-left">${historial||"Sin pagos"}</div>

      </div>`;
    });

  });
}

/* FUNCIONES */
function abonar(n,s){
  let m = prompt("Monto:");
  if(!m) return;
  db.collection("pagos").add({
    barbero:n,
    semana:s,
    monto:+m,
    mes:mes.value,
    fecha:new Date()
  });
}

function liquidar(n,s){
  db.collection("pagos").add({
    barbero:n,
    semana:s,
    monto:40,
    mes:mes.value,
    fecha:new Date()
  });
}

function eliminar(id){
  db.collection("pagos").doc(id).delete();
}

function editarBarbero(nombreViejo){
  let nuevo = prompt("Nuevo nombre del barbero:", nombreViejo);
  if(!nuevo || nuevo.trim()=="") return;

  let batch = db.batch();

  db.collection("pagos")
  .where("barbero","==",nombreViejo)
  .get().then(snap=>{

    snap.forEach(doc=>{
      batch.update(doc.ref,{
        barbero:nuevo.trim()
      });
    });

    batch.commit().then(()=>{
      refrescarTodo();
    });

  });
}

/* FINANZAS */
function actualizar(){

let mesSel = mes.value;

let ingresosV = 0;
let gastosV = 0;
let usdtV = 0;

let gastosHTML = "";
let usdtHTML = "";

Promise.all([

db.collection("pagos").where("mes","==",mesSel).get(),

db.collection("gastos").where("mes","==",mesSel).get(),

db.collection("usdt").where("mes","==",mesSel).get()

]).then(([p,g,u])=>{

/* INGRESOS */
p.forEach(d=>{
  ingresosV += Number(d.data().monto || 0);
});

/* GASTOS */
g.forEach(d=>{
  let data = d.data();
  gastosV += Number(data.monto || 0);

  gastosHTML += `
  <div style="display:flex;justify-content:space-between;font-size:12px;">
    <span>${data.concepto || "Gasto"} - $${data.monto}</span>
    <button onclick="eliminarGasto('${d.id}')" style="color:red;">❌</button>
  </div>`;
});

/* USDT */
u.forEach(d=>{
  let data = d.data();
  usdtV += Number(data.usdt || 0);

  usdtHTML += `
  <div style="display:flex;justify-content:space-between;font-size:12px;">
    <span>USDT: ${data.usdt} (BS ${data.bs})</span>
    <button onclick="eliminarUSDT('${d.id}')" style="color:red;">❌</button>
  </div>`;
});

/* CALCULOS */
let efectivoV = ingresosV - gastosV - usdtV;
let gananciaV = ingresosV - gastosV;

/* UI */
ingresos.innerText = "$" + ingresosV;
gastos.innerText = "$" + gastosV;
wallet.innerText = usdtV;
efectivo.innerText = "$" + efectivoV;
ganancia.innerText = "$" + gananciaV;

/* REPORTE */
reporteMes.innerHTML = `
Mes: ${mesSel}<br><br>

<b>Gastos</b><br>
${gastosHTML || "Sin gastos"}<br><br>

<b>USDT</b><br>
${usdtHTML || "Sin compras"}<br><br>

<b>Resumen</b><br>
Ingresos: $${ingresosV}<br>
Gastos: $${gastosV}<br>
USDT: ${usdtV}<br>
Ganancia: $${gananciaV}<br>
Efectivo: $${efectivoV}
`;

});

}

</script>

</body>
</html>
