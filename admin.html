<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
url('fondo.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
font-family:system-ui;
}

/* TARJETAS */
.card{
background:rgba(20,20,20,0.75);
backdrop-filter:blur(6px);
border-radius:18px;
padding:15px;
margin-bottom:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

/* TARJETA DESTACADA */
.bank{
background:linear-gradient(145deg,#d4af37,#f5d97b);
color:black;
font-weight:bold;
}

/* BOTONES */
.btn{
padding:6px;
border-radius:10px;
font-size:12px;
transition:0.2s;
}
.btn:hover{transform:scale(1.05);}

.gold{background:#d4af37;color:black;}
.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
.blue{background:#2563eb;color:white;}

/* TEXTOS */
.title{font-size:13px;opacity:0.7;}
.big{font-size:20px;font-weight:bold;}

.tab{padding:8px;border-radius:10px;background:#111;}
.active{background:#d4af37;color:black;}
</style>
</head>

<body class="p-4">

<!-- LOGIN -->
<div id="login" class="flex flex-col items-center justify-center h-screen">
<img src="logo.png" style="width:100px;">
<input id="pin" type="password" class="p-2 bg-black border text-center mt-2">
<button onclick="entrar()" class="btn gold mt-2">Entrar</button>
</div>

<div id="panel" style="display:none;">

<div class="flex gap-2 mb-3">
<button onclick="tab('c')" class="tab active">Cobranza</button>
<button onclick="tab('f')" class="tab">Finanzas</button>
</div>

<!-- COBRANZA -->
<div id="cobranza">
<div class="card">
<input type="month" id="mes" class="w-full p-2 bg-black text-white">
</div>
<div id="sillas"></div>
</div>

<!-- FINANZAS -->
<div id="finanzas" style="display:none;">

<div class="grid grid-cols-2 gap-3">

<div class="card bank">
<div class="title">Ingresos</div>
<div class="big" id="ingresos">$0</div>
</div>

<div class="card">
<div class="title">Gastos</div>
<div class="big text-red-400" id="gastos">$0</div>
</div>

<div class="card">
<div class="title">USDT</div>
<div class="big text-green-400" id="wallet">0</div>
<button onclick="comprarUSDT()" class="btn gold w-full mt-2">Comprar</button>
</div>

<div class="card">
<div class="title">Efectivo</div>
<div class="big text-yellow-400" id="efectivo">$0</div>
</div>

<div class="card col-span-2">
<div class="title">Ganancia Real</div>
<div class="big text-green-400" id="ganancia">$0</div>
</div>

</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📊 Reporte del Mes</h3>
<div id="reporteMes"></div>
<button onclick="exportarReporte()" class="btn gold w-full mt-2">Exportar</button>
</div>

</div>

</div>

<script>

/* LOGIN */
function entrar(){
if(pin.value=="2210"){
login.style.display="none";
panel.style.display="block";
}
}

/* MES */
mes.value=new Date().toISOString().slice(0,7);

/* TABS */
function tab(x){
cobranza.style.display=x=="c"?"block":"none";
finanzas.style.display=x=="f"?"block":"none";
}

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIzaSyA7g2TA_6P4Wwzw1AfbsfNtwZijA",
projectId:"westeros-barbershop"
});
const db=firebase.firestore();

/* DATA */
let nombres=["Stark","Targaryen","Lannister","Baratheon","Guardia"];
let logos=["stark.png","targaryen.png","lannister.png","baratheon.png","night.png"];

/* COBRANZA */
function render(){
db.collection("pagos").onSnapshot(snap=>{

sillas.innerHTML="";
let mesSel=mes.value;

nombres.forEach((n,i)=>{

let semanas=[0,0,0,0];
let historial="";

snap.forEach(doc=>{
let d=doc.data();
if(d.barbero==n && d.mes==mesSel){
semanas[d.semana-1]+=d.monto;

let f=new Date(d.fecha);
historial+=`
<div style="display:flex;justify-content:space-between;font-size:12px;">
<span>${f.toLocaleDateString()} - $${d.monto}</span>
<button onclick="eliminar('${doc.id}')" style="color:red;">❌</button>
</div>`;
}
});

let total=semanas.reduce((a,b)=>a+b,0);
let restante=160-total;

let semanasHTML="";
for(let s=0;s<4;s++){
let pagado=semanas[s]>=40;

semanasHTML+=`
<div style="border-bottom:1px solid #333;padding:5px;">
<div style="display:flex;justify-content:space-between;">
<span>Semana ${s+1}</span>
<span>${pagado
? "<span style='color:#22c55e'>✔ $40</span>"
: "<span style='color:#ef4444'>❌ $"+semanas[s]+"</span>"}
</span>
</div>
<div style="display:flex;gap:5px;">
<button onclick="abonar('${n}',${s+1})" class="btn green">Abonar</button>
<button onclick="liquidar('${n}',${s+1})" class="btn gold">Liquidar</button>
</div>
</div>`;
}

sillas.innerHTML+=`
<div class="card text-center">

<img src="${logos[i]}" style="width:50px;margin:auto;">
<div class="big">${n}</div>

${semanasHTML}

<hr>

Total: $${total}<br>
Debe: $${restante}

<button onclick="editar(${i})" class="btn gold w-full mt-1">Editar</button>
<button onclick="recibo('${n}',${total},${restante})" class="btn blue w-full mt-1">Recibo</button>

<div class="mt-2 text-left">${historial||"Sin pagos"}</div>

</div>`;
});

});
}

/* FUNCIONES */
function abonar(n,s){
let m=prompt("Monto:");
db.collection("pagos").add({barbero:n,semana:s,monto:+m,mes:mes.value,fecha:new Date()});
}

function liquidar(n,s){
db.collection("pagos").add({barbero:n,semana:s,monto:40,mes:mes.value,fecha:new Date()});
}

function eliminar(id){
db.collection("pagos").doc(id).delete();
}

function editar(i){
let x=prompt("Nombre:");
if(x) nombres[i]=x;
render();
}

function recibo(n,t,r){
let msg=`💈 ${n}\nPagado: $${t}\nDebe: $${r}`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

/* USDT */
function comprarUSDT(){
let m=prompt("Monto:");
if(!m) return;

db.collection("usdt").add({monto:+m,fecha:new Date()});
db.collection("gastos").add({concepto:"Compra USDT",monto:+m,fecha:new Date()});
}

/* DASHBOARD + REPORTE */
function actualizar(){

let mesSel=mes.value;

db.collection("pagos").get().then(p=>{
let ingresos=0;
p.forEach(d=>{if(d.data().mes==mesSel) ingresos+=d.data().monto;});

db.collection("gastos").get().then(g=>{
let gastos=0;
g.forEach(d=>{
let m=new Date(d.data().fecha).toISOString().slice(0,7);
if(m==mesSel) gastos+=d.data().monto;
});

db.collection("usdt").get().then(u=>{
let usdt=0;
u.forEach(d=>{
let m=new Date(d.data().fecha).toISOString().slice(0,7);
if(m==mesSel) usdt+=d.data().monto;
});

let efectivo=ingresos-gastos-usdt;
let ganancia=ingresos-gastos;

ingresos.innerText="$"+ingresos;
gastos.innerText="$"+gastos;
wallet.innerText=usdt;
efectivo.innerText="$"+efectivo;
ganancia.innerText="$"+ganancia;

reporteMes.innerHTML=`
Mes: ${mesSel}<br>
Ingresos: $${ingresos}<br>
Gastos: $${gastos}<br>
USDT: $${usdt}<br>
Ganancia: $${ganancia}<br>
Efectivo: $${efectivo}
`;

});

});

});
}

/* EXPORTAR */
function exportarReporte(){
let blob=new Blob([reporteMes.innerText]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="reporte.txt";
a.click();
}

/* GRAFICO */
let chart;
db.collection("pagos").onSnapshot(p=>{
let data=[0,0,0,0,0];
p.forEach(d=>{
let i=nombres.indexOf(d.data().barbero);
if(i>=0) data[i]+=d.data().monto;
});
if(chart) chart.destroy();
chart=new Chart(grafico,{type:"bar",data:{labels:nombres,datasets:[{data:data}]}})
});

/* EVENTOS */
mes.addEventListener("change",()=>{render();actualizar();});

render();
actualizar();

</script>

</body>
</html>
